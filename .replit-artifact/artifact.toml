kind = "web"
previewPath = "/"
title = "Logic Lab"
version = "1.0.0"
id = "artifacts/logic-lab"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21691

[services.development]
run = "pnpm --filter @workspace/logic-lab run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/logic-lab", "run", "build" ]
publicDir = "artifacts/logic-lab/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21691"
BASE_PATH = "/"
